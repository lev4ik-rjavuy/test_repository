name: Python Tests CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Unit Tests
        run: |
          python -m unittest L7_unittests.py

      - name: Run Doctests
        run: |
          python -m doctest L7_15.py -v
